# ============================================================================
# ORDEN DE IMPORTACIÓN: CARGA EL ARCHIVO DE ENTORNO EN EL CLASSPATH
# ============================================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# CONFIGURACIÓN GENERAL
server.port=${PORT:8080}
spring.application.name=${STEPSIDE_APPLICATION_NAME}
stepside.security.application-id=${STEPSIDE_SECURITY_APPLICATION_ID}
stepside.security.application-name-prefix=${STEPSIDE_SECURITY_APPLICATION_NAME_PREFIX}
stepside.api.url=${STEPSIDE_BACKEND_URL}

#########################################################
##Conexión MongoDB
#########################################################
spring.data.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PWD}@${MONGO_URL}/${DATABASE}?connectTimeoutMS=10000&socketTimeoutMS=45000&maxPoolSize=50&minPoolSize=5&maxIdleTimeMS=60000&retryWrites=true&retryReads=true

#########################################################
# Mapeo elástico de las variables de entorno de StepSide
#########################################################

stepside.jwt.secret=${STEPSIDE_JWT_SECRET}
stepside.jwt.expiration-hours=${STEPSIDE_JWT_EXPIRATION_HOURS}

# Propiedad para el balanceador de Google Cloud que vimos antes
server.forward-headers-strategy=FRAMEWORK

# ============================================================================
# CONFIGURACIÓN DEL MOTOR DE NOTIFICACIONES POR EMAIL (SMTP)
# ============================================================================
spring.mail.host=${STEPSIDE_MAIL_HOST}
spring.mail.port=${STEPSIDE_MAIL_PORT}
spring.mail.username=${STEPSIDE_MAIL_USERNAME}
spring.mail.password=${STEPSIDE_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Tiempos de espera estándar para control de hilos
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Confianza explícita al host original
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3


